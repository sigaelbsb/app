<div class="row mb-4 animate__animated animate__fadeInDown">
    <div class="col-12">
        <div class="banner-modulo banner-configuracion p-4 p-md-5 text-white shadow-sm">
            <div class="burbuja-3d burbuja-1"></div>
            <div class="burbuja-3d burbuja-2"></div>
            <div class="burbuja-3d burbuja-3"></div>
            <div class="row align-items-center position-relative z-1">
                <div class="col-md-9 text-center text-md-start mb-3 mb-md-0">
                    <span class="badge bg-white text-primary mb-3 px-3 py-2 shadow-sm fw-bold banner-badge-config"><i class="bi bi-sliders me-1"></i> DIRECCIÓN Y SISTEMA</span>
                    <h1 class="fw-bolder mb-2 text-white banner-titulo-config">Configuración Global</h1>
                    <p class="mb-0 fw-bold fs-5 banner-subtitulo-config">Parámetros, años escolares y fases académicas del sistema.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row g-4 animate__animated animate__fadeIn">
    <!-- Años Escolares -->
    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 h-100 card-periodos">
            <div class="card-header bg-white border-bottom p-3 d-flex justify-content-between align-items-center rounded-top-4">
                <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-calendar-event-fill me-2 color-periodos"></i>Años Escolares</h5>
                <div class="d-flex gap-1" id="acciones-periodos">
                    <button class="btn btn-sm btn-light border fw-bold shadow-sm" id="btn-importar-periodos" title="Importar desde CSV">
                        <i class="bi bi-filetype-csv text-primary"></i>
                    </button>
                    <button class="btn btn-sm text-white fw-bold shadow-sm bg-periodos" id="btn-nuevo-periodo">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush" id="lista-periodos"></div>
            </div>
        </div>
    </div>

    <!-- Fases Académicas (Lapsos) -->
    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 h-100 card-lapsos">
            <div class="card-header bg-white border-bottom p-3 d-flex justify-content-between align-items-center rounded-top-4">
                <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-clock-history me-2 color-lapsos"></i>Fases Académicas</h5>
                <div class="d-flex gap-1" id="acciones-lapsos">
                    <button class="btn btn-sm btn-light border fw-bold shadow-sm" id="btn-importar-lapsos" title="Importar desde CSV">
                        <i class="bi bi-filetype-csv text-info"></i>
                    </button>
                    <button class="btn btn-sm text-white fw-bold shadow-sm bg-lapsos" id="btn-nuevo-lapso">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush" id="lista-lapsos"></div>
            </div>
        </div>
    </div>

    <!-- Niveles Educativos -->
    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 h-100 card-niveles">
            <div class="card-header bg-white border-bottom p-3 d-flex justify-content-between align-items-center rounded-top-4">
                <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-mortarboard-fill me-2 color-niveles"></i>Niveles Educativos</h5>
                <div class="d-flex gap-1" id="acciones-niveles">
                    <button class="btn btn-sm btn-light border fw-bold shadow-sm" id="btn-importar-niveles" title="Importar desde CSV">
                        <i class="bi bi-filetype-csv text-success"></i>
                    </button>
                    <button class="btn btn-sm text-white fw-bold shadow-sm bg-niveles" id="btn-nuevo-nivel">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="list-group list-group-flush" id="lista-niveles"></div>
            </div>
        </div>
    </div>
</div>
